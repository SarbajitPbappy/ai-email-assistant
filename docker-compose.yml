version: '3.8'

services:
  # Main Telegram Bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-bot
    environment:
      - PYTHONUNBUFFERED=1
      - PRIMARY_LLM=${PRIMARY_LLM:-ollama}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - USER_EMAIL=${USER_EMAIL}
      - USER_NAME=${USER_NAME}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - email-network

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-dashboard
    command: streamlit run src/dashboard/app.py --server.port 8503 --server.address 0.0.0.0
    environment:
      - PYTHONUNBUFFERED=1
      - PRIMARY_LLM=${PRIMARY_LLM:-ollama}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - USER_EMAIL=${USER_EMAIL}
      - USER_NAME=${USER_NAME}
    ports:
      - "8503:8503"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - email-network

  # Ollama LLM Service (Optional - can skip if using cloud LLM only)
  ollama:
    image: ollama/ollama:latest
    container_name: email-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    networks:
      - email-network
    # Uncomment to pull a model on startup
    # entrypoint: /bin/sh -c "ollama pull llama3 && ollama serve"

volumes:
  ollama-data:

networks:
  email-network:
    driver: bridge
